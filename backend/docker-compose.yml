version: "3.9"

services:
  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - order_service
    networks:
      - microservices_net

  order_service:
    build:
      context: .
      dockerfile: services/order_service/Dockerfile
    container_name: order_service
    ports:
      - "8001:8001"
    depends_on:
      - payment_service
    networks:
      - microservices_net

  payment_service:
    build:
      context: .
      dockerfile: services/payment_service/Dockerfile
    container_name: payment_service
    ports:
      - "8002:8002"
    depends_on:
      - inventory_service
    networks:
      - microservices_net

  inventory_service:
    build:
      context: .
      dockerfile: services/inventory_service/Dockerfile
    container_name: inventory_service
    ports:
      - "8003:8003"
    networks:
      - microservices_net

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestrator
    ports:
      - "9000:9000"
    depends_on:
      - api_gateway
      - order_service
      - payment_service
      - inventory_service
    networks:
      - microservices_net

networks:
  microservices_net:
    driver: bridge

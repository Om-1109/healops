version: "3.9"

services:
  api_gateway:
    build: ./backend/services/api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - order_service

  order_service:
    build: ./backend/services/order_service
    ports:
      - "8001:8001"
    depends_on:
      - payment_service

  payment_service:
    build: ./backend/services/payment_service
    ports:
      - "8002:8002"
    depends_on:
      - inventory_service

  inventory_service:
    build: ./backend/services/inventory_service
    ports:
      - "8003:8003"

  orchestrator:
    build: ./backend
    ports:
      - "9000:9000"
    depends_on:
      - api_gateway
      - order_service
      - payment_service
      - inventory_service